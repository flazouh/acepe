services:
  db:
    image: postgres:16-alpine
    container_name: acepe-website-db
    environment:
      POSTGRES_USER: acepe
      POSTGRES_PASSWORD: acepe
      POSTGRES_DB: acepe_website
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
