<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!--
			Per-page SEO meta (title, description, canonical, OpenGraph, Twitter, JSON-LD)
			is emitted by the centralized <Seo /> component in $lib/components/seo/seo.svelte.
			This keeps every route's social cards and search snippets accurate and avoids
			duplicate meta tags. Only static, always-applicable head tags live here.
		-->
		<meta name="application-name" content="Acepe" />
		<meta name="apple-mobile-web-app-title" content="Acepe" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="format-detection" content="telephone=no" />
		<meta name="color-scheme" content="light dark" />

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet" />

		<!-- Favicon: /brand/* paths force a fresh fetch (Chrome ignores ?v= on icons) -->
		<link rel="icon" href="/brand/acepe-mark.ico" sizes="any" />
		<link rel="icon" href="/brand/acepe-mark.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" sizes="180x180" href="/brand/acepe-a-180.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/brand/acepe-a-32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/brand/acepe-a-16.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#f7f7f7" media="(prefers-color-scheme: light)" />
		<script>
			(function () {
				var KEY = 'acepe-theme';
				var stored = null;
				try {
					stored = window.localStorage.getItem(KEY);
				} catch {}
				var preference =
					stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
				var prefersDark = true;
				try {
					prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				} catch {}
				var effective =
					preference === 'system' ? (prefersDark ? 'dark' : 'light') : preference;
				document.documentElement.dataset.theme = effective;
				document.documentElement.dataset.themePreference = preference;
				document.documentElement.style.colorScheme = effective;
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
