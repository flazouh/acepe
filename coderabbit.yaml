# CodeRabbit Configuration for Acepe
# This file provides AI-driven code review guidelines for the Acepe project

project:
  name: Acepe
  description: Desktop application providing unified interface for AI agents via Agent Client Protocol (ACP)
  tech_stack:
    - Tauri 2 + Rust (Backend)
    - SvelteKit 2 + Svelte 5 + TypeScript (Frontend)
    - Tailwind CSS 4 + shadcn-svelte (UI)

review_guidelines:
  # General Code Quality
  - Check for proper error handling in all code paths
  - Verify type safety and explicit typing
  - Ensure code follows existing patterns and conventions
  - Look for potential security vulnerabilities
  - Check for performance issues and unnecessary allocations

  # Rust-Specific Guidelines
  rust:
    - Always run `cargo check` or `cargo clippy` before considering code complete
    - Fix all compilation errors before submitting changes
    - Address warnings when possible, especially unused variables and dead code
    - Use Rust best practices and follow existing code style
    - Prefer explicit types when compiler cannot infer them
    - Add appropriate error handling with `anyhow::Context` for error context
    - Tauri commands must be async and return `Result<T, String>`
    - Use `tokio::process::Command` for async subprocess spawning
    - Subprocess stderr must be consumed to prevent blocking (spawn async task to drain)
    - Service pattern: Manage resource lifecycle (spawn/stop subprocess) properly
    - All Tauri commands must be registered in `lib.rs` in `.invoke_handler()` chain

  # TypeScript/Svelte-Specific Guidelines
  typescript_svelte:
    - **CRITICAL**: All async operations MUST use `ResultAsync<T, E>` from neverthrow, NEVER use `Promise<Result<T, E>>`
    - **FORBIDDEN**: Never use the `??` (nullish coalescing) operator
    - **FORBIDDEN**: Never have optional values in components - if something is not defined, don't render that component; instead, in the parent, display something else
    - **ALWAYS**: One type per file - each TypeScript interface, type, or enum must be in its own file
    - Use explicit types for function parameters and return values
    - Prefer `const` over `let`, never use `var`
    - Use `async/await` instead of promise chains (but wrap in ResultAsync)
    - Call hooks at component top level only
    - Use semantic HTML and ARIA attributes for accessibility
    - Use Svelte 5 runes: `$state`, `$derived`, `$effect` for reactivity
    - State is managed in `.svelte.ts` files using runes
    - Build UI from small, focused, reusable components
    - Never use try-catch blocks - use ResultAsync error handling instead
    - Use `.map()`, `.andThen()`, `.mapErr()`, `.orElse()` for ResultAsync chaining
    - Never wrap synchronous operations in `Promise.resolve().then()`
    - All ACP responses must have TypeScript interfaces in `acp/types.ts`

  # Error Handling Patterns
  error_handling:
    rust:
      - Use `anyhow::Context` to add context to errors before converting to strings
      - Tauri commands should return `Result<T, String>` with descriptive error messages
      - Handle subprocess errors gracefully with proper cleanup
    
    typescript:
      - All async methods must return `ResultAsync<T, E>`, never `Promise<Result<T, E>>`
      - Use `ResultAsync.fromPromise(promise, errorMapper)` for promise conversion
      - Use `.mapErr()` to add context, `.orElse()` for fallbacks
      - Never use try-catch blocks - use ResultAsync error handling
      - Wrap library calls that may throw in try-catch only when necessary, then convert to ResultAsync

  # Architecture Patterns
  architecture:
    - Frontend → Backend: Use Tauri `invoke()` for commands
    - Backend → ACP Agent: JSON-RPC over stdin/stdout
    - All communication uses JSON-RPC 2.0 format
    - Request IDs must be unique; responses matched to requests
    - Strong typing with Rust (serde) and TypeScript (interfaces) for all protocol messages

  # Security & Performance
  security:
    - Never hardcode API keys or secrets
    - Validate all user inputs
    - Sanitize data before sending to external services
    - Ensure subprocess stderr is consumed to prevent blocking
    - Properly handle subprocess lifecycle (cleanup on errors)

  performance:
    - Avoid unnecessary allocations in hot paths
    - Use appropriate async patterns (ResultAsync, not Promise chains)
    - Ensure subprocess streams are properly drained
    - Check for memory leaks in long-running processes

# Specific Issues to Flag
issues_to_flag:
  - Missing error handling in async operations
  - Use of `Promise<Result<T, E>>` instead of `ResultAsync<T, E>`
  - Use of `??` (nullish coalescing) operator
  - Optional values in component props (should conditionally render instead)
  - Missing try-catch around library calls that may throw (e.g., file rendering)
  - Subprocess stderr not being consumed (can block subprocess)
  - Missing error context in Rust error handling
  - Tauri commands not properly registered
  - Type definitions not in separate files
  - Missing explicit types in function signatures
  - Use of `var` instead of `const`/`let`
  - Missing ARIA attributes in UI components
  - Svelte hooks called conditionally or in loops

# Code Review Focus Areas
focus_areas:
  - Error handling completeness
  - Type safety and explicit typing
  - Adherence to neverthrow patterns
  - Rust best practices and clippy compliance
  - Svelte 5 runes usage
  - Component composition and reusability
  - Subprocess management and resource cleanup
  - Protocol compliance (JSON-RPC, ACP)
  - Security vulnerabilities
  - Performance optimizations

# Examples of Good vs Bad Code
examples:
  neverthrow:
    good: |
      loadUser(id: string): ResultAsync<User, Error> {
        return ResultAsync.fromPromise(fetchUser(id), (e) => new Error(`API failed: ${e}`))
          .map(user => ({ ...user, loadedAt: Date.now() }))
          .andThen(validateUser)
          .mapErr(e => new Error(`User loading failed: ${e.message}`));
      }
    
    bad: |
      async loadUser(id: string): Promise<Result<User, Error>> {
        try {
          const user = await fetchUser(id);
          return ok(user);
        } catch (error) {
          return err(new Error(String(error)));
        }
      }
  
  rust_error_handling:
    good: |
      #[tauri::command]
      async fn my_command() -> Result<String, String> {
        some_operation()
          .context("Failed to perform operation")
          .map_err(|e| e.to_string())
      }
    
    bad: |
      #[tauri::command]
      async fn my_command() -> Result<String, String> {
        Ok(some_operation().unwrap())
      }
  
  subprocess_stderr:
    good: |
      let mut child = cmd.spawn()?;
      if let Some(stderr) = child.stderr.take() {
        tokio::spawn(async move {
          let _ = tokio::io::copy(&mut stderr, &mut tokio::io::sink()).await;
        });
      }
    
    bad: |
      let mut child = cmd.spawn()?;
      // stderr not consumed - can block subprocess
