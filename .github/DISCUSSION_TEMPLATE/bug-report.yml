title: "[Bug] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Open Acepe
        2. Go to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: If applicable, add screenshots or screen recordings to help explain the problem.
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      description: What OS are you running?
      placeholder: e.g. macOS 15.3, Windows 11, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Acepe version
      description: What version of Acepe are you using?
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, logs, or error messages.
    validations:
      required: false
