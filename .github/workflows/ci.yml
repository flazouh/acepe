name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: short

jobs:
  # ── JS/TS: format+lint+typecheck + all package tests (parallel) ────
  # Matches root `bun run test` coverage, plus svelte-check on desktop and full Biome check.
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
          cache: true
          cache-dependency-path: bun.lock

      - run: bun install --frozen-lockfile

      # Website svelte-check needs env vars declared in .env for $env/static/public types
      - run: cp packages/website/.env.example packages/website/.env

      - name: Forbid structural tests (repo-wide)
        run: bun scripts/forbid-structural-tests.ts packages

      - name: Biome + typecheck + tests
        run: |
          set -euo pipefail
          (cd packages/desktop && bunx @biomejs/biome check --diagnostic-level=error .) &
          BIOME_DESKTOP=$!
          (cd packages/website && bunx @biomejs/biome check --diagnostic-level=error .) &
          BIOME_WEBSITE=$!
          (cd packages/desktop && bun run check) &
          CHECK_DESKTOP_TSGO=$!
          (cd packages/desktop && bun run check:svelte) &
          CHECK_DESKTOP_SVELTE=$!
          (cd packages/website && bun run check) &
          CHECK_WEBSITE=$!
          (cd packages/ui && bun run check) &
          CHECK_UI=$!
          (cd packages/agent-panel-contract && bun test) &
          TEST_AGENT=$!
          (cd packages/ui && bun test) &
          TEST_UI=$!
          (cd packages/desktop && bun run test) &
          TEST_DESKTOP=$!
          (cd packages/website && bun run test) &
          TEST_WEBSITE=$!

          FAIL=0
          for PID in $BIOME_DESKTOP $BIOME_WEBSITE $CHECK_DESKTOP_TSGO $CHECK_DESKTOP_SVELTE \
            $CHECK_WEBSITE $CHECK_UI $TEST_AGENT $TEST_UI $TEST_DESKTOP $TEST_WEBSITE; do
            wait "$PID" || FAIL=1
          done
          exit $FAIL

  # ── Rust: check + clippy + test ─────────────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target
          prefix-key: v2
          cache-on-failure: "true"

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq --no-install-recommends \
            libwebkit2gtk-4.1-dev librsvg2-dev \
            libgtk-3-dev libayatana-appindicator3-dev libasound2-dev patchelf

      - name: Clippy + Test
        working-directory: packages/desktop/src-tauri
        run: |
          set -o pipefail
          cargo clippy --all-targets --no-default-features -- -D warnings
          cargo test --no-default-features -- --skip claude_history::export_types
