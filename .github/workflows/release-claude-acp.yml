name: Release Claude ACP

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update (for example claude-acp/v0.1.0)
        required: true
        type: string
  push:
    tags:
      - "claude-acp/v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform.asset_platform }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: macos-latest
            asset_platform: darwin-aarch64
          - runner: macos-13
            asset_platform: darwin-x86_64

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Claude ACP dependencies
        working-directory: packages/acps/claude
        run: bun install --frozen-lockfile

      - name: Run Claude ACP tests
        working-directory: packages/acps/claude
        run: bun run test:run

      - name: Build Claude ACP binary
        working-directory: packages/acps/claude
        run: bun run build:binary

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then echo "No certificate, skipping"; exit 0; fi
          CERT_PATH="$RUNNER_TEMP/apple-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/claude-acp-signing.keychain-db"

          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p temp1234 "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p temp1234 "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp1234 "$KEYCHAIN_PATH"

      - name: Codesign Claude ACP binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        working-directory: packages/acps/claude
        run: |
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then echo "No identity, skipping"; exit 0; fi
          codesign \
            --force \
            --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            --entitlements Entitlements.plist \
            dist/claude-agent-acp

      - name: Verify codesign
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        working-directory: packages/acps/claude
        run: |
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then echo "No identity, skipping"; exit 0; fi
          codesign --verify --strict --verbose dist/claude-agent-acp

      - name: Create release archive
        working-directory: packages/acps/claude
        run: |
          tar -czf "claude-agent-acp-${{ matrix.platform.asset_platform }}.tar.gz" -C dist claude-agent-acp

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-agent-acp-${{ matrix.platform.asset_platform }}
          path: packages/acps/claude/claude-agent-acp-${{ matrix.platform.asset_platform }}.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/claude-agent-acp-darwin-aarch64/claude-agent-acp-darwin-aarch64.tar.gz
            artifacts/claude-agent-acp-darwin-x86_64/claude-agent-acp-darwin-x86_64.tar.gz
