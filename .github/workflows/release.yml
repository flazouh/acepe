name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to build and publish (for example v2026.4.14)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and release (macOS aarch64)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Resolve release context
        id: release_context
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          VERSION="${TAG_NAME#v}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target
          prefix-key: v2
          cache-on-failure: "true"

      - name: Set version from tag
        run: |
          VERSION="${{ steps.release_context.outputs.version }}"
          echo "Updating tauri.conf.json to version $VERSION"
          cd packages/desktop/src-tauri
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp tauri.conf.json

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Verify required secrets are present
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: |
          missing=()
          [ -z "$SENTRY_DSN" ]        && missing+=("SENTRY_DSN")
          [ -z "$VITE_SENTRY_DSN" ]   && missing+=("VITE_SENTRY_DSN")
          [ -z "$VITE_POSTHOG_KEY" ]  && missing+=("VITE_POSTHOG_KEY")
          [ -z "$VITE_POSTHOG_HOST" ] && missing+=("VITE_POSTHOG_HOST")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "✅ All analytics secrets are present"

      - name: Build release notes from changelog
        id: release_notes
        run: |
          VERSION="${{ steps.release_context.outputs.version }}"
          NOTES_FILE="$(mktemp)"
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\] - " { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md | sed '1{/^$/d;}' > "$NOTES_FILE"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "No changelog entry found for $VERSION" >&2
            exit 1
          fi

          {
            echo "body<<EOF"
            cat "$NOTES_FILE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve existing release
        id: release_target
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.release_context.outputs.tag_name }}"
          RELEASE_ID="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" --jq '.id' 2>/dev/null || true)"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

      # Pin to the exact tauri-action revision used by the last known-good v2026.4.13 release.
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Updater signing (Tauri CLI generates .sig files)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Code signing (Tauri CLI handles keychain import automatically)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Analytics
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        with:
          releaseId: ${{ steps.release_target.outputs.release_id }}
          tauriScript: bunx tauri
          projectPath: packages/desktop
          tagName: ${{ steps.release_context.outputs.tag_name }}
          releaseName: ${{ steps.release_context.outputs.tag_name }}
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target aarch64-apple-darwin -- --no-default-features
